name: Debug Mexico calendar data

on:
  workflow_dispatch:

jobs:
  debug-mexico:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Inspect Mexico schedule data
        run: python debug_mexico_calendar.py
