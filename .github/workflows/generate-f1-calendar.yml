name: Generate Formula 1 calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */12 * * *"

permissions:
  contents: write

jobs:
  generate-f1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ics python-dateutil requests

      - name: Generate Formula 1 calendar
        run: python generate_f1.py

      - name: Commit generated Formula 1 calendar
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated Formula 1 calendar"
          file_pattern: "docs/f1/*.ics"
