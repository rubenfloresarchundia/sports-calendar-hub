name: Generate NFL calendars

on:
  workflow_dispatch:
  schedule:
    - cron: "45 */12 * * *"

permissions:
  contents: write

jobs:
  generate-nfl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ics python-dateutil requests

      - name: Generate NFL calendars
        run: python generate_nfl.py

      - name: Commit generated NFL calendars
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated NFL calendars"
          file_pattern: "docs/nfl/*.ics"
