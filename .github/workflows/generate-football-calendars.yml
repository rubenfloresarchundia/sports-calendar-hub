name: Generate football calendars

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */12 * * *"

permissions:
  contents: write

jobs:
  generate-football:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ics PyYAML python-dateutil requests

      - name: Generate football calendars
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python generate_football.py

      - name: Commit generated football calendars
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated football calendars"
          file_pattern: "docs/football/*.ics"
