name: Generate sports calendars

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ics PyYAML python-dateutil requests

      - name: Generate calendars
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
          TENNIS_API_HOST: ${{ secrets.TENNIS_API_HOST }}
        run: python generate.py

      - name: Commit generated calendars
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated sports calendars"
          
