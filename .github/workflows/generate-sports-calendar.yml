name: Generate Sports Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "55 */12 * * *"

permissions:
  contents: write

jobs:
  generate-sports-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ics

      - name: Generate Sports Calendar
        run: python generate_sports_calendar.py

      - name: Commit generated calendar
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Sports Calendar"
          file_pattern: "docs/sports/*.ics"
