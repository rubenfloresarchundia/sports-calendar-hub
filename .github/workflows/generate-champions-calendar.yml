name: Generate Champions calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */12 * * *"

permissions:
  contents: write

jobs:
  generate-champions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ics python-dateutil requests

      - name: Generate Champions calendar
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python generate_champions_calendar.py

      - name: Commit generated Champions calendar
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update global Champions calendar"
          file_pattern: "docs/football/champions-global.ics"
