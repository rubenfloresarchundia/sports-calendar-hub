name: Test Tennis API connection

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Test ATP fixtures endpoint
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
          TENNIS_API_HOST: ${{ secrets.TENNIS_API_HOST }}
        run: |
          python - <<'PY'
          import os
          import json
          import requests

          api_key = os.environ["TENNIS_API_KEY"]
          api_host = os.environ["TENNIS_API_HOST"]

          url = f"https://{api_host}/tennis/v2/atp/fixtures"

          headers = {
              "x-rapidapi-key": api_key,
              "x-rapidapi-host": api_host,
              "Content-Type": "application/json",
          }

          params = {
              "include": "round,tournament,tournament.country",
              "pageSize": 5,
              "pageNo": 1,
          }

          response = requests.get(url, headers=headers, params=params, timeout=30)

          print("Status code:", response.status_code)
          print("Content type:", response.headers.get("content-type"))

          data = response.json()

          print("Top-level type:", type(data).__name__)
          print("Top-level keys:", list(data.keys()))

          fixtures = data.get("data", [])

          print("Fixtures count:", len(fixtures))

          if not fixtures:
              print("No fixtures returned.")
          else:
              print("First fixture keys:")
              print(list(fixtures[0].keys()))

              print("First fixture sample:")
              print(json.dumps(fixtures[0], indent=2, ensure_ascii=False)[:5000])
          PY
