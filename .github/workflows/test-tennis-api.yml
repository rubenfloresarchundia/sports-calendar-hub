name: Test Tennis API connection

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Find ATP player IDs
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
          TENNIS_API_HOST: ${{ secrets.TENNIS_API_HOST }}
        run: |
          python - <<'PY'
          import os
          import requests

          api_key = os.environ["TENNIS_API_KEY"]
          api_host = os.environ["TENNIS_API_HOST"]

          target_players = {
              "Jannik Sinner",
              "Carlos Alcaraz",
              "Novak Djokovic",
          }

          headers = {
              "x-rapidapi-key": api_key,
              "x-rapidapi-host": api_host,
              "Content-Type": "application/json",
          }

          found = {}

          for page in range(1, 11):
              url = f"https://{api_host}/tennis/v2/atp/player"

              params = {
                  "filter": "PlayerGroup:singles",
                  "pageSize": 100,
                  "pageNo": page,
              }

              response = requests.get(url, headers=headers, params=params, timeout=30)

              print("Page:", page)
              print("Status code:", response.status_code)

              data = response.json()

              if isinstance(data, dict):
                  players = data.get("data", [])
              elif isinstance(data, list):
                  players = data
              else:
                  players = []

              print("Players returned:", len(players))

              for player in players:
                  name = player.get("name")

                  if name in target_players:
                      found[name] = {
                          "id": player.get("id"),
                          "name": player.get("name"),
                          "country": player.get("countryAcr"),
                          "rank": player.get("currentRank"),
                      }

              if target_players.issubset(found.keys()):
                  break

          print("FOUND PLAYERS:")
          for name in sorted(found):
              player = found[name]
              print(
                  f"{player['name']} | ID: {player['id']} | "
                  f"Country: {player['country']} | Rank: {player['rank']}"
              )

          missing = target_players - set(found.keys())

          if missing:
              print("MISSING PLAYERS:")
              for name in sorted(missing):
                  print(name)

              raise SystemExit(1)
          PY
